<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantrámico</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #fullscreen-hint {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #f2f5ff;
            font-family: "Segoe UI", Tahoma, sans-serif;
            font-size: 14px;
            letter-spacing: 0.3px;
            z-index: 9999;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.35s ease;
        }

        #fullscreen-hint.hidden {
            opacity: 0;
        }
    </style>
    <script>
        const bootstrapDebug = new URLSearchParams(window.location.search).get("debugBootstrap") === "1";
        const bootstrapLog = (...args) => {
            if (bootstrapDebug) {
                console.log("[bootstrap]", ...args);
            }
        };

        const randomQuery = `r=${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
        window.__cacheBustQuery = randomQuery;
        bootstrapLog("cache token", randomQuery);

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = () => {
                    bootstrapLog("loaded", src);
                    resolve();
                };
                script.onerror = () => {
                    console.error("[bootstrap] failed", src);
                    reject(new Error(`Failed to load script: ${src}`));
                };
                document.head.appendChild(script);
            });
        }

        function loadLocalScriptWithRandomQuery(src) {
            return loadScript(`${src}${src.includes("?") ? "&" : "?"}${randomQuery}`);
        }

        const bootstrapScripts = [
            { src: "https://cdn.jsdelivr.net/npm/lodash@4.17.15/lodash.min.js", cacheBust: false },
            { src: "https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js", cacheBust: false },
            { src: "./modules/three.min.js", cacheBust: true },
            { src: "./lib/partykals.js", cacheBust: true }
        ];

        window.__scriptsReady = bootstrapScripts.reduce(
            (chain, item) => chain.then(() => item.cacheBust
                ? loadLocalScriptWithRandomQuery(item.src)
                : loadScript(item.src)
            ),
            Promise.resolve()
        ).then(() => {
            bootstrapLog("all scripts ready");
        });
    </script>
</head>

<body>
    <div id="fullscreen-hint">Click para pantalla completa</div>

    <script type="module">
        await window.__scriptsReady;

        const randomQuery = window.__cacheBustQuery || `r=${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
        const sceneDefinitionPath = `./scene.definition.json?${randomQuery}`;
        const fullscreenHint = document.getElementById("fullscreen-hint");

        const hideFullscreenHint = () => {
            if (fullscreenHint) {
                fullscreenHint.classList.add("hidden");
            }
        };

        const handleFirstInteraction = () => {
            hideFullscreenHint();

            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {
                    // Ignore fullscreen errors (gesture timing, browser policy).
                });
            }

            if (typeof Tone !== "undefined" && typeof Tone.start === "function") {
                Tone.start().catch(() => {
                    // Ignore audio-context unlock errors.
                });
            }
        };

        window.addEventListener("click", handleFirstInteraction, { once: true });

        setTimeout(hideFullscreenHint, 5500);

        const { default: scene } = await import(`./modules/scene.js?${randomQuery}`);

        const getDefaultSceneDefinition = () => ({
            initializeScene: true,
            scene3d: {},
            audioSetLibrary: {},
            audioQueue: [],
            baseTracks: []
        });

        const deepClone = (value) => {
            if (typeof structuredClone === "function") {
                return structuredClone(value);
            }

            return JSON.parse(JSON.stringify(value));
        };

        const normalizeSceneDefinition = (definition) => {
            const defaults = getDefaultSceneDefinition();
            if (!definition || typeof definition !== "object") {
                return defaults;
            }

            const normalized = {
                initializeScene: definition.initializeScene !== false,
                scene3d: {},
                audioSetLibrary: {},
                audioQueue: [],
                baseTracks: []
            };

            if (definition.scene3d && typeof definition.scene3d === "object" && !Array.isArray(definition.scene3d)) {
                normalized.scene3d = definition.scene3d;
            }

            if (definition.audioSetLibrary && typeof definition.audioSetLibrary === "object") {
                Object.entries(definition.audioSetLibrary).forEach(([id, setDefinition]) => {
                    if (typeof id !== "string" || !id.trim()) {
                        return;
                    }

                    if (!setDefinition || typeof setDefinition !== "object") {
                        return;
                    }

                    normalized.audioSetLibrary[id.trim()] = setDefinition;
                });
            }

            const queueCandidates = Array.isArray(definition.audioQueue)
                ? definition.audioQueue
                : (Array.isArray(definition.audioSets) ? definition.audioSets : []);

            normalized.audioQueue = queueCandidates
                .map((entry) => {
                    if (typeof entry === "string") {
                        return { id: entry.trim() };
                    }

                    if (!entry || typeof entry !== "object") {
                        return null;
                    }

                    if (entry.definition && typeof entry.definition === "object") {
                        return { definition: entry.definition };
                    }

                    if (typeof entry.id === "string" && entry.id.trim()) {
                        return { id: entry.id.trim() };
                    }

                    return null;
                })
                .filter(Boolean);

            if (!normalized.audioQueue.length) {
                normalized.audioQueue = defaults.audioQueue;
            }

            if (Array.isArray(definition.baseTracks)) {
                normalized.baseTracks = definition.baseTracks
                    .filter((path) => typeof path === "string" && path.trim())
                    .map((path) => path.trim());
            }

            if (!normalized.baseTracks.length) {
                normalized.baseTracks = defaults.baseTracks;
            }

            return normalized;
        };

        const loadSceneDefinition = async () => {
            try {
                const response = await fetch(sceneDefinitionPath, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const rawDefinition = await response.json();
                return normalizeSceneDefinition(rawDefinition);
            } catch (error) {
                console.warn("[bootstrap] scene definition fallback", error);
                return getDefaultSceneDefinition();
            }
        };

        const sceneDefinition = await loadSceneDefinition();

        if (sceneDefinition.initializeScene) {
            scene.init(sceneDefinition.scene3d);
        }

        sceneDefinition.audioQueue.forEach((entry) => {
            const setDefinition = entry.definition
                || (entry.id ? sceneDefinition.audioSetLibrary[entry.id] : null);

            if (!setDefinition) {
                console.warn("[bootstrap] missing audio set", entry.id);
                return;
            }

            scene.addAudioSet(deepClone(setDefinition));
        });

        sceneDefinition.baseTracks.forEach((path) => {
            scene.addBase(path);
        });
    </script>
</body>

</html>
